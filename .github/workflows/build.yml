name: Build & Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'

jobs:
  build-and-release:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Update submodule to latest main
        run: |
          git submodule update --remote --merge
          echo "Submodule commit: $(git -C deps/cleanlock rev-parse HEAD)"

      - name: Determine version
        id: version
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_TAG"

      - name: Inject version into Info.plist
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i '' "s|<string>0.1.0</string>|<string>${VERSION}</string>|g" Sources/CleanLockApp/Info.plist

      - name: Build arm64
        run: swift build -c release --arch arm64

      - name: Build x86_64
        run: swift build -c release --arch x86_64

      - name: Create universal binary
        run: |
          lipo -create \
            .build/arm64-apple-macosx/release/CleanLockApp \
            .build/x86_64-apple-macosx/release/CleanLockApp \
            -output CleanLockApp-universal

      - name: Create .app bundle
        run: |
          APP="CleanLock.app"
          mkdir -p "${APP}/Contents/MacOS"
          mkdir -p "${APP}/Contents/Resources"
          cp CleanLockApp-universal "${APP}/Contents/MacOS/CleanLockApp"
          cp Sources/CleanLockApp/Info.plist "${APP}/Contents/Info.plist"
          cp Resources/AppIcon.icns "${APP}/Contents/Resources/AppIcon.icns"

      - name: Package
        run: |
          zip -r CleanLock-macos.zip CleanLock.app
          SHA256=$(shasum -a 256 CleanLock-macos.zip | awk '{print $1}')
          echo "SHA256=$SHA256" >> $GITHUB_ENV

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: CleanLock App ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            CleanLock-macos.zip
          body: |
            **SHA256:** `${{ env.SHA256 }}`

            ### Install
            ```bash
            brew tap ugurcandede/cleanlock
            brew install --cask cleanlock-app
            ```

            Or download `CleanLock-macos.zip`, extract, and move `CleanLock.app` to Applications.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
