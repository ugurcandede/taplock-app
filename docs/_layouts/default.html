<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title == "Home" %}{{ site.title }} — {{ site.description }}{% else %}{{ page.title }} | {{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="{{ '/favicon.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header>
    <div class="container">
      <a class="logo" href="{{ '/' | relative_url }}">
        <img src="{{ '/assets/images/icon.png' | relative_url }}" alt="TapLock" width="28" height="28" onerror="this.style.display='none'">
        <span>TapLock</span>
      </a>
      <nav>
        <a href="{{ '/guide' | relative_url }}">Guide</a>
        <a href="{{ '/faq' | relative_url }}">FAQ</a>
        <a href="{{ '/download' | relative_url }}" class="btn-nav">Download</a>
      </nav>
    </div>
  </header>

  <main class="{% if page.title != 'Home' %}page-content{% endif %}">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer>
    <div class="container">
      Built with ❤️ for Mac users<br>
      <a href="https://github.com/ugurcandede">ugurcandede</a> · <a href="https://github.com/ugurcandede/taplock">CLI</a> · <a href="https://github.com/ugurcandede/taplock-app">App</a>
    </div>
  </footer>
</body>
</html>
